<!-- Loading skeleton -->
<div *ngIf="isLoading" class="card skeleton"></div>

<!-- Empty state — not enough ratings -->
<div *ngIf="!isLoading && !data" class="card card--empty">
  Rate at least 3 movies to see your score
</div>

<!-- Content -->
<div *ngIf="!isLoading && data" class="card">
  <div class="card__icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
        stroke="#c04040" stroke-width="1.5" fill="rgba(180,30,30,0.15)"/>
      <line x1="12" y1="9" x2="12" y2="13" stroke="#c04040" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="12" cy="17" r="0.8" fill="#c04040"/>
    </svg>
  </div>
  <div class="card__body">
    <div class="card__label">{{ data!.label }}</div>
    <div class="card__sub">{{ subtitle }}</div>
  </div>
  <div class="card__delta" [ngStyle]="{ color: deltaColor }">
    {{ data!.formattedDelta }}
  </div>
</div>
