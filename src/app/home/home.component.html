<div class="home">

  <!-- Logo overlay — dark gradient, centered branding -->
  <div class="home__header">
    <span class="home__logo-title">Film Foodies</span>
    <span class="home__logo-tagline">Movie &amp; Dinner Club</span>
  </div>

  <!-- Three full-bleed panels side by side -->
  <div class="home__panels">

    <!-- Suggest panel (Gold) -->
    <button
      class="home__panel home__panel--suggest"
      (click)="navigate('suggest/new')"
      aria-label="Suggest a movie"
    >
      <div class="home__panel-glow home__panel-glow--gold"></div>
      <div class="home__panel-icon home__panel-icon--gold">
        <svg class="home__panel-svg" viewBox="0 0 26 26" fill="none">
          <rect x="3" y="4" width="20" height="14" rx="2" stroke="#d4a03a" stroke-width="1.5" fill="none"/>
          <line x1="3" y1="8" x2="23" y2="8" stroke="#d4a03a" stroke-width="1"/>
          <line x1="7" y1="4" x2="7" y2="8" stroke="#d4a03a" stroke-width="1.5"/>
          <line x1="13" y1="4" x2="13" y2="8" stroke="#d4a03a" stroke-width="1.5"/>
          <line x1="19" y1="4" x2="19" y2="8" stroke="#d4a03a" stroke-width="1.5"/>
          <circle cx="13" cy="15" r="3" stroke="#d4a03a" stroke-width="1.2" fill="none"/>
          <line x1="11" y1="22" x2="15" y2="22" stroke="#d4a03a" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="13" y1="19" x2="13" y2="22" stroke="#d4a03a" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="home__panel-label home__panel-label--gold">Suggest</span>
      <span class="home__panel-hint home__panel-hint--gold">add a movie</span>
    </button>

    <!-- Movie Night panel (Crimson Red) -->
    <button
      class="home__panel home__panel--movie-night"
      (click)="navigate('movie-night')"
      aria-label="Go to Movie Night"
    >
      <div class="home__panel-glow home__panel-glow--red"></div>
      <div class="home__panel-icon home__panel-icon--red">
        <svg class="home__panel-svg" viewBox="0 0 26 26" fill="none">
          <path d="M5 20 C5 20 7 14 13 14 C19 14 21 20 21 20" stroke="#c04040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <circle cx="13" cy="9" r="4" stroke="#c04040" stroke-width="1.5" fill="none"/>
          <path d="M9 20 L9 22 M13 20 L13 22 M17 20 L17 22" stroke="#c04040" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M3 22 L23 22" stroke="#c04040" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M7 12 C5 13 4 15 5 17" stroke="#c04040" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
          <path d="M19 12 C21 13 22 15 21 17" stroke="#c04040" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>
      <span class="home__panel-label home__panel-label--red">Movie Night</span>
      <span class="home__panel-hint home__panel-hint--red">log a night</span>
    </button>

    <!-- History panel (Midnight Blue) -->
    <button
      class="home__panel home__panel--history"
      (click)="navigate('history')"
      aria-label="Go to History"
    >
      <div class="home__panel-glow home__panel-glow--blue"></div>
      <div class="home__panel-icon home__panel-icon--blue">
        <svg class="home__panel-svg" viewBox="0 0 26 26" fill="none">
          <rect x="4" y="6" width="18" height="14" rx="2" stroke="#4070d0" stroke-width="1.5" fill="none"/>
          <circle cx="13" cy="13" r="4" stroke="#4070d0" stroke-width="1.2" fill="none"/>
          <circle cx="13" cy="13" r="1.5" fill="#4070d0"/>
          <line x1="4" y1="9" x2="7" y2="9" stroke="#4070d0" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="19" y1="9" x2="22" y2="9" stroke="#4070d0" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="4" y1="17" x2="7" y2="17" stroke="#4070d0" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="19" y1="17" x2="22" y2="17" stroke="#4070d0" stroke-width="1.2" stroke-linecap="round"/>
          <rect x="1" y="3" width="3" height="20" rx="1" fill="#4070d0" opacity="0.4"/>
          <rect x="22" y="3" width="3" height="20" rx="1" fill="#4070d0" opacity="0.4"/>
        </svg>
      </div>
      <span class="home__panel-label home__panel-label--blue">History</span>
      <span class="home__panel-hint home__panel-hint--blue">past nights</span>
    </button>

  </div>

  <!-- Rate bar — static for now; will become conditional when rating flow is built -->
  <div class="home__rate-bar" (click)="navigate('rate')">
    <div class="home__rate-poster">
      <div class="home__poster-crop">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <polygon points="12,3 14.5,9 21,9 15.5,13.5 17.5,20 12,16 6.5,20 8.5,13.5 3,9 9.5,9" fill="#c04040" opacity="0.7"/>
        </svg>
      </div>
    </div>
    <div class="home__rate-content">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <polygon points="7,1 8.5,5 13,5 9.5,8 10.5,12.5 7,10 3.5,12.5 4.5,8 1,5 5.5,5" fill="#c04040"/>
      </svg>
      <div>
        <div class="home__rate-lbl">Rate</div>
        <div class="home__rate-movie">Rate the last movie night</div>
      </div>
    </div>
    <button
      class="home__nav-fab"
      (click)="toggleMenu($event)"
      aria-label="Open navigation menu"
    >
      <span class="home__nav-bar"></span>
      <span class="home__nav-bar"></span>
      <span class="home__nav-bar"></span>
    </button>
  </div>

  <!-- Overlay backdrop — closes drawer on tap -->
  <div
    class="home__overlay-bg"
    [class.home__overlay-bg--show]="menuOpen"
    (click)="closeMenu()"
  ></div>

  <!-- Bottom sheet navigation drawer -->
  <div class="home__menu-drawer" [class.home__menu-drawer--open]="menuOpen">
    <div class="home__drawer-handle"></div>

    <div class="home__menu-item" (click)="navigate('select-member')">
      <div class="home__menu-icon home__menu-icon--gold">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="6" r="3" stroke="#d4a03a" stroke-width="1.3" fill="none"/>
          <path d="M3 14 C3 14 4 10 8 10 C12 10 13 14 13 14" stroke="#d4a03a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="home__menu-text">
        <div class="home__menu-title">Switch Names</div>
        <div class="home__menu-sub">Select who you are</div>
      </div>
      <div class="home__menu-chevron"></div>
    </div>

    <div class="home__menu-item" (click)="navigate('profile')">
      <div class="home__menu-icon home__menu-icon--gold">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="4" width="12" height="9" rx="1.5" stroke="#d4a03a" stroke-width="1.3" fill="none"/>
          <line x1="5" y1="7" x2="11" y2="7" stroke="#d4a03a" stroke-width="1" stroke-linecap="round"/>
          <line x1="5" y1="9.5" x2="9" y2="9.5" stroke="#d4a03a" stroke-width="1" stroke-linecap="round"/>
          <circle cx="13" cy="4" r="2.5" fill="#d4a03a"/>
          <path d="M12 4 L13 5 L14.5 3" stroke="#0d0d0d" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="home__menu-text">
        <div class="home__menu-title">My Profile</div>
        <div class="home__menu-sub">Your ratings &amp; stats</div>
      </div>
      <div class="home__menu-chevron"></div>
    </div>

    <div class="home__menu-item" (click)="navigate('discover')">
      <div class="home__menu-icon home__menu-icon--purple">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="5.5" stroke="#9060c0" stroke-width="1.3" fill="none"/>
          <path d="M6 6 C6 4.5 10 4.5 10 6.5 C10 8 8 8.5 8 10" stroke="#9060c0" stroke-width="1.3" stroke-linecap="round"/>
          <circle cx="8" cy="12" r="0.8" fill="#9060c0"/>
        </svg>
      </div>
      <div class="home__menu-text">
        <div class="home__menu-title">Discover Movies</div>
        <div class="home__menu-sub">Picks for you</div>
      </div>
      <div class="home__sparkle-badge">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M5 1 L5.8 3.8 L8.5 5 L5.8 6.2 L5 9 L4.2 6.2 L1.5 5 L4.2 3.8 Z" fill="#d4a03a"/>
        </svg>
      </div>
    </div>

    <div class="home__menu-item" (click)="navigate('suggest')">
      <div class="home__menu-icon home__menu-icon--gray">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="3" width="12" height="10" rx="1.5" stroke="#888" stroke-width="1.3" fill="none"/>
          <line x1="5" y1="6" x2="11" y2="6" stroke="#888" stroke-width="1" stroke-linecap="round"/>
          <line x1="5" y1="8.5" x2="11" y2="8.5" stroke="#888" stroke-width="1" stroke-linecap="round"/>
          <line x1="5" y1="11" x2="8" y2="11" stroke="#888" stroke-width="1" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="home__menu-text">
        <div class="home__menu-title">View Suggestions</div>
        <div class="home__menu-sub">Movies in the queue</div>
      </div>
      <div class="home__menu-chevron"></div>
    </div>

    <div class="home__menu-item" (click)="navigate('stats')">
      <div class="home__menu-icon home__menu-icon--blue">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="10" width="3" height="4" rx="0.5" fill="#4070d0" opacity="0.6"/>
          <rect x="6.5" y="7" width="3" height="7" rx="0.5" fill="#4070d0" opacity="0.8"/>
          <rect x="11" y="4" width="3" height="10" rx="0.5" fill="#4070d0"/>
          <line x1="1" y1="14.5" x2="15" y2="14.5" stroke="#4070d0" stroke-width="0.8"/>
        </svg>
      </div>
      <div class="home__menu-text">
        <div class="home__menu-title">Stats</div>
        <div class="home__menu-sub">Group analytics</div>
      </div>
      <div class="home__menu-chevron"></div>
    </div>

    <div class="home__menu-divider"></div>

    <div class="home__menu-item" (click)="navigate('bulk-import')">
      <div class="home__menu-icon home__menu-icon--gray">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="12" height="10" rx="1.5" stroke="#666" stroke-width="1.3" fill="none"/>
          <line x1="4" y1="5" x2="12" y2="5" stroke="#666" stroke-width="0.8" stroke-linecap="round"/>
          <line x1="4" y1="7.5" x2="12" y2="7.5" stroke="#666" stroke-width="0.8" stroke-linecap="round"/>
          <line x1="4" y1="10" x2="8" y2="10" stroke="#666" stroke-width="0.8" stroke-linecap="round"/>
          <path d="M8 13 L8 15 M6 15 L10 15" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="home__menu-text">
        <div class="home__menu-title">Bulk Import</div>
        <div class="home__menu-sub">Add historical nights</div>
      </div>
      <div class="home__menu-chevron"></div>
    </div>

    <div class="home__menu-item" (click)="navigate('admin')">
      <div class="home__menu-icon home__menu-icon--gray">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="5.5" stroke="#666" stroke-width="1.3" fill="none"/>
          <circle cx="8" cy="8" r="2" stroke="#666" stroke-width="1.3" fill="none"/>
          <line x1="8" y1="2.5" x2="8" y2="4.5" stroke="#666" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="8" y1="11.5" x2="8" y2="13.5" stroke="#666" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="2.5" y1="8" x2="4.5" y2="8" stroke="#666" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="11.5" y1="8" x2="13.5" y2="8" stroke="#666" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="home__menu-text">
        <div class="home__menu-title">Settings</div>
        <div class="home__menu-sub">Theme, passcode, admin</div>
      </div>
      <div class="home__menu-chevron"></div>
    </div>

  </div>

</div>
