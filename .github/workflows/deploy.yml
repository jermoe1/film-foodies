name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Required for peaceiris/actions-gh-pages to push to gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write production environment file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          DTDD_API_KEY: ${{ secrets.DTDD_API_KEY }}
        run: |
          cat > src/environments/environment.prod.ts << EOF
          export const environment = {
            production: true,
            supabaseUrl: '${SUPABASE_URL}',
            supabaseAnonKey: '${SUPABASE_ANON_KEY}',
            omdbApiKey: '${OMDB_API_KEY}',
            dtddApiKey: '${DTDD_API_KEY}',
          };
          EOF

      - name: Build Angular app
        # --base-href must match the GitHub Pages repo path: /film-foodies/
        # HashLocationStrategy means URLs are /#/route — no server-side routing needed
        run: npm run build -- --base-href "/film-foodies/" --configuration production

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/film-foodies/browser
          # Adds .nojekyll so GitHub Pages serves Angular's files without Jekyll processing
          enable_jekyll: false
